<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Le Grand Bain</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #020817; color: #fff; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    #app { min-height: 100vh; }
    .wrap { max-width: 520px; margin: 0 auto; padding: 24px 18px; }
    .glass { background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; }
    .btn-primary {
      display: inline-block;
      width: 100%;
      background: linear-gradient(135deg, #0EA5E9, #0284C7);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const app = document.getElementById('app');

    function render() {
      app.innerHTML = `
        <div class="wrap">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px">
            <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#0EA5E9,#06B6D4);display:flex;align-items:center;justify-content:center;font-size:14px">🌊</div>
            <span style="color:#38BDF8;font-size:11px;letter-spacing:.15em;text-transform:uppercase;font-weight:600">Le Grand Bain</span>
          </div>

          <h1 style="font-family:'Playfair Display',serif;font-size:44px;line-height:1.15;margin-bottom:10px">
            Du bord<br><span style="color:#38BDF8;font-style:italic">au large.</span>
          </h1>

          <p style="color:#94A3B8;font-size:15px;line-height:1.65;max-width:360px;margin-bottom:26px">
            Le premier programme audio conçu par un MNS pour passer de l'anxiété aquatique à la liberté totale dans l'eau.
          </p>

          <div class="glass" style="padding:20px;margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <span style="color:#94A3B8;font-size:13px">Ta progression</span>
              <span style="color:#38BDF8;font-weight:700;font-size:17px">0<span style="color:#475569;font-size:12px;font-weight:400">/18</span></span>
            </div>
            <div style="height:5px;background:#0f172a;border-radius:5px;overflow:hidden;margin-bottom:16px">
              <div style="height:100%;width:0%;background:linear-gradient(90deg,#0EA5E9,#06B6D4)"></div>
            </div>
            <div style="display:flex">
              <div style="flex:1;text-align:center">
                <div style="font-size:22px;font-weight:700;color:#0EA5E9">0%</div>
                <div style="font-size:11px;color:#475569;margin-top:2px">Complété</div>
              </div>
              <div style="width:1px;background:rgba(255,255,255,0.06)"></div>
              <div style="flex:1;text-align:center">
                <div style="font-size:22px;font-weight:700;color:#10B981">—</div>
                <div style="font-size:11px;color:#475569;margin-top:2px">Score moyen</div>
              </div>
              <div style="width:1px;background:rgba(255,255,255,0.06)"></div>
              <div style="flex:1;text-align:center">
                <div style="font-size:22px;font-weight:700;color:#8B5CF6">1/6</div>
                <div style="font-size:11px;color:#475569;margin-top:2px">Semaine</div>
              </div>
            </div>
          </div>

          <button class="btn-primary">Continuer le programme →</button>
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
